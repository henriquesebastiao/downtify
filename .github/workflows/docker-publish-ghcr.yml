name: Publish Docker Image to GHCR

on:
  push:
    branches:
      - feat/itunes-genre-enrichment
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Image Name
        id: prep
        run: |
          IMAGE_RAW="ghcr.io/${{ github.repository_owner }}/downtify"
          IMAGE_LOWER=$(echo "$IMAGE_RAW" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_LOWER" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_name }}:latest
            ${{ steps.prep.outputs.image_name }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
