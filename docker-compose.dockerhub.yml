# Pull Downtify from Docker Hub (dx616b fork — slskd + Navidrome branch).
#
#   cp docker-compose.dockerhub.yml docker-compose.yml
#   # Edit volume host paths, then:
#   docker compose pull
#   docker compose up -d
#
# Image tags: latest | slskd-dev | <git-sha>

services:
  downtify:
    container_name: downtify
    image: dx616b/downtify:${TAG-latest}
    restart: unless-stopped
    ports:
      - '8000:30321'
    environment:
      - DOWNTIFY_PORT=30321
    volumes:
      - /path/to/music/downloads:/downloads
      - /path/to/music/slskd:/slskd
      - downtify_data:/data

volumes:
  downtify_data:
